name: release

on:
  release:
    types: [published]

jobs:
  binaries_linux_windows:
    name: binaries (linux/windows)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pull source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries_darwin:
    name: binaries (darwin)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Pull source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Install gox
        run: go install github.com/mitchellh/gox@master

      - name: Build release (darwin)
        run: >
          gox -output="{{.OS}}/{{.Arch}}/{{.Dir}}" \
            -osarch='darwin/arm64' -ldflags="
            -X 'github.com/gorse-io/gorse/cmd/version.Version=$(git describe --tags $(git rev-parse HEAD))'
            -X 'github.com/gorse-io/gorse/cmd/version.GitCommit=$(git rev-parse HEAD)'
            -X 'github.com/gorse-io/gorse/cmd/version.BuildTime=$(date)'" ./...

      - name: Install zip
        run: brew install zip

      - name: Zip binaries
        run: zip -j gorse_darwin_arm64.zip darwin/arm64/gorse-*

      - name: Prepare standalone CLI binary
        run: cp darwin/arm64/gorse-cli gorse-cli_darwin_arm64

      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: gorse_darwin_arm64.zip
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload standalone CLI binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: gorse-cli_darwin_arm64
          tag: ${{ github.ref }}
          overwrite: true

  docker_images:
    name: docker images
    runs-on: ubuntu-latest
    steps:
      - name: Pull source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: get_version
        uses: battila7/get-version-action@v2

      - if: github.event.release.prerelease == false
        name: Build Docker image
        uses: docker/bake-action@v6
        with:
          source: .
          targets: default
          push: true
        env:
          VERSIONS: latest,${{ steps.get_version.outputs.major }}.${{ steps.get_version.outputs.minor }},${{ steps.get_version.outputs.version-without-v }}

      - if: github.event.release.prerelease == true
        name: Build prerelease Docker image
        uses: docker/bake-action@v6
        with:
          source: .
          targets: default
          push: true
        env:
          VERSIONS: ${{ steps.get_version.outputs.version-without-v }}

  windows_images:
    name: docker images (windows)
    runs-on: windows-latest
    steps:
      - name: Pull source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: get_version
        uses: battila7/get-version-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build docker image
        if: github.event.release.prerelease == false
        run: |
          foreach ($image in "gorse-master", "gorse-server", "gorse-worker", "gorse-in-one") {
            docker build -f cmd/${image}/Dockerfile.windows `
              -t zhenghaoz/${image}:windowsservercore `
              -t zhenghaoz/${image}:${{ steps.get_version.outputs.major }}.${{ steps.get_version.outputs.minor }}-windowsservercore `
              -t zhenghaoz/${image}:${{ steps.get_version.outputs.version-without-v }}-windowsservercore .
            docker image push --all-tags zhenghaoz/$image
          }

      - name: Build prerelease docker image
        if: github.event.release.prerelease == true
        run: |
          foreach ($image in "gorse-master", "gorse-server", "gorse-worker", "gorse-in-one") {
            docker build -f cmd/${image}/Dockerfile.windows `
              -t zhenghaoz/${image}:${{ steps.get_version.outputs.version-without-v }}-windowsservercore .
            docker image push --all-tags zhenghaoz/$image
          }
